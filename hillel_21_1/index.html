<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap & jQuery ToDo (Full)</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="container mt-5" style="max-width: 550px;">
        <h2 class="text-center mb-4">Мій ToDo List</h2>
        
        <div class="input-group mb-4">
            <input type="text" id="task-input" class="form-control" placeholder="Введіть нове завдання..." aria-label="Нове завдання">
            <button class="btn btn-primary" type="button" id="add-btn">Додати</button>
        </div>
        
        <ul id="todo-list" class="list-group">
            <li class="list-group-item d-flex justify-content-between align-items-center todo-item">
                <span class="task-text">Купити молоко</span>
                <button class="btn btn-danger btn-sm delete-btn">Видалити</button>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center todo-item">
                <span class="task-text">Зробити домашку з JS</span>
                <button class="btn btn-danger btn-sm delete-btn">Видалити</button>
            </li>
        </ul>
    </div>

    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="taskModalLabel">Ваше завдання</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p id="modal-task-text">Текст завдання</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
          </div>
        </div>
      </div>
    </div>

    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dist/script.js"></script>
</body>
</html>
