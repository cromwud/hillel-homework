<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Випадкове зображення</title>
    <style>
        body { 
            text-align: center; 
            padding-top: 50px; 
            font-family: sans-serif; 
            background-color: white;
        }
        .image-container { 
            margin-top: 20px; 
            min-height: 300px;
        }
        img { 
            max-width: 500px; 
            border: 5px solid #fff; 
            border-radius: 10px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        button { 
            padding: 12px 24px; 
            cursor: pointer; 
            font-size: 18px; 
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: blue;
        }
    </style>
</head>
<body>

    <h2>Випадкове фото</h2>
    <button id="next-btn">Показати інше фото</button>

    <div class="image-container">
        <img id="random-img" src="" alt="Тут буде зображення" style="display:none;">
    </div>

    <script src="script.js"></script>
</body>
</html>
